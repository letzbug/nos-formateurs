<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Formateurs</title>

<style>

:root{
  --blue:#0066ff;
  --blue2:#00a6ff;
  --bg:#eef5ff;
  --card:#ffffff;
  --text:#132033;
  --muted:#6b7a90;
  --line:rgba(0,70,160,.14);
  --shadow:0 18px 45px rgba(0,50,120,.12);
  --radius:22px;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(0,166,255,.20), transparent 35%),
    linear-gradient(135deg,#eef5ff,#ffffff);
  color:var(--text);
}

.wrap{
  max-width:1300px;
  margin:auto;
  padding:28px 18px;
}

header{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:white;
  padding:32px;
  border-radius:30px;
  margin-bottom:24px;
  box-shadow:var(--shadow);
}

header h1{
  margin:0 0 8px;
  font-size:clamp(2rem,5vw,4rem);
}

header p{
  margin:0;
  opacity:.9;
}

.tools{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:24px;
}

input,
select,
button{
  flex:1;
  min-width:220px;
  padding:14px 16px;
  border-radius:999px;
  border:1px solid var(--line);
  font-size:1rem;
  background:white;
  box-shadow:0 8px 22px rgba(0,50,120,.06);
}

button{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:white;
  font-weight:bold;
  cursor:pointer;
  border:none;
}

button:hover{
  transform:translateY(-2px);
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
  margin-bottom:24px;
}

.stat{
  background:white;
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow);
}

.stat strong{
  display:block;
  font-size:2rem;
  color:var(--blue);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:18px;
}

.card{
  background:white;
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.name{
  font-size:1.3rem;
  font-weight:800;
  margin-bottom:10px;
}

.meta{
  color:var(--muted);
  margin-bottom:14px;
  line-height:1.5;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:14px;
}

.tag{
  font-size:.78rem;
  padding:6px 10px;
  border-radius:999px;
  background:#eef5ff;
  color:#0050c8;
}

.course{
  border-top:1px solid var(--line);
  padding-top:12px;
  margin-top:12px;
  font-size:.9rem;
  color:var(--muted);
}

.course b{
  color:var(--text);
}

footer{
  text-align:center;
  margin-top:30px;
  color:var(--muted);
  font-size:.85rem;
}

.empty{
  background:white;
  padding:30px;
  border-radius:22px;
  text-align:center;
  box-shadow:var(--shadow);
}

@media print{

  body{
    background:white;
  }

  header,
  .tools,
  footer,
  .stats{
    display:none;
  }

  .grid{
    display:block;
  }

  .card{
    break-inside:avoid;
    box-shadow:none;
    border:1px solid #ccc;
    margin-bottom:12px;
  }

}

</style>
</head>

<body>

<div class="wrap">

<header>
  <h1>Formateurs</h1>
  <p>Liste à jour suivant base de donnée</p>
</header>

<div class="tools">

  <input
    id="search"
    type="search"
    placeholder="Rechercher un formateur..."
  />

  <select id="filterGroup">
    <option value="ALL">Tous</option>
    <option value="UNIPOP">UniPop</option>
    <option value="AUTRES">Autres</option>
  </select>

  <select id="sort">
    <option value="name">Trier par nom</option>
    <option value="courses">Trier par nombre de cours</option>
  </select>

  <button id="printBtn">
    🖨️ Imprimer
  </button>

</div>

<div class="stats">

  <div class="stat">
    <strong id="totalTeachers">0</strong>
    Formateurs
  </div>

  <div class="stat">
    <strong id="totalCourses">0</strong>
    Cours
  </div>

  <div class="stat">
    <strong id="visibleTeachers">0</strong>
    Résultats
  </div>

</div>

<main id="grid" class="grid"></main>

<footer>
  Données chargées depuis trainings.json
</footer>

</div>

<script>

const DATA_URL =
"https://cdn.jsdelivr.net/gh/letzbug/franks_magic@f2390030c96e8fef5bd6f9d7bc7a29be2971c488/data/trainings.json";

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const sort = document.getElementById("sort");
const filterGroup = document.getElementById("filterGroup");
const printBtn = document.getElementById("printBtn");

const totalTeachers = document.getElementById("totalTeachers");
const totalCourses = document.getElementById("totalCourses");
const visibleTeachers = document.getElementById("visibleTeachers");

let trainings = [];
let teachers = [];

function clean(v){
  return v ? String(v).trim() : "";
}

function fullName(t){
  return `${clean(t.prenom)} ${clean(t.nom)}`.trim();
}

function uniq(arr){
  return [...new Set(arr.filter(Boolean))];
}

function getGroup(course){
  return course.organisateur?.code === "UNIPOP"
    ? "UNIPOP"
    : "AUTRES";
}

async function loadData(){

  try{

    const response = await fetch(DATA_URL,{
      cache:"no-store"
    });

    trainings = await response.json();

    const map = new Map();

    trainings.forEach(course => {

      const enseignants =
        Array.isArray(course.enseignants)
          ? course.enseignants
          : [];

      const group = getGroup(course);

      enseignants.forEach(enseignant => {

        const name = fullName(enseignant);

        if(!name) return;

        const key = name.toLowerCase();

        if(!map.has(key)){

          map.set(key,{
            name,
            prenom:clean(enseignant.prenom),
            nom:clean(enseignant.nom),

            courses:[],
            matieres:[],
            langues:[],
            formats:[],
            groups:[]
          });

        }

        const item = map.get(key);

        item.courses.push({
          title:clean(course.intitule),
          date:clean(course.dateDebut),
          matiere:clean(course.matiereNom),
          langue:clean(course.langueCoursNom),
          format:clean(course.format),
          group
        });

        item.matieres.push(clean(course.matiereNom));
        item.langues.push(clean(course.langueCoursNom));
        item.formats.push(clean(course.format));
        item.groups.push(group);

      });

    });

    teachers = [...map.values()].map(t => ({
      ...t,
      matieres:uniq(t.matieres),
      langues:uniq(t.langues),
      formats:uniq(t.formats),
      groups:uniq(t.groups)
    }));

    render();

  }catch(error){

    grid.innerHTML = `
      <div class="empty">
        Impossible de charger la JSON.<br>
        ${error.message}
      </div>
    `;

    console.error(error);

  }

}

function render(){

  const q =
    search.value.toLowerCase().trim();

  const group =
    filterGroup.value;

  let filtered = teachers.filter(t => {

    const text = [

      t.name,
      t.matieres.join(" "),
      t.langues.join(" "),
      t.formats.join(" ")

    ].join(" ").toLowerCase();

    const matchesSearch =
      text.includes(q);

    const matchesGroup =

      group === "ALL"

      ||

      t.groups.includes(group);

    return matchesSearch && matchesGroup;

  });

  if(sort.value === "courses"){

    filtered.sort((a,b)=>
      b.courses.length - a.courses.length
    );

  }else{

    filtered.sort((a,b)=>
      a.nom.localeCompare(b.nom)
    );

  }

  totalTeachers.textContent =
    teachers.length;

  totalCourses.textContent =
    trainings.length;

  visibleTeachers.textContent =
    filtered.length;

  if(!filtered.length){

    grid.innerHTML = `
      <div class="empty">
        Aucun résultat.
      </div>
    `;

    return;

  }

  grid.innerHTML = filtered.map(t => {

    const courses = t.courses

      .filter(c => {

        if(group === "ALL")
          return true;

        return c.group === group;

      })

      .slice(0,5)

      .map(c => `

        <div class="course">

          <b>${escapeHtml(c.title)}</b><br>

          ${escapeHtml(c.date)}
          ·
          ${escapeHtml(c.matiere)}
          ·
          ${escapeHtml(c.langue)}

        </div>

      `).join("");

    return `

      <article class="card">

        <div class="name">
          ${escapeHtml(t.name)}
        </div>

        <div class="meta">
          ${t.courses.length} cours<br>
          ${escapeHtml(
            t.matieres.slice(0,4).join(", ")
          )}
        </div>

        <div class="tags">

          ${t.groups.map(g => `
            <span class="tag">
              ${escapeHtml(g)}
            </span>
          `).join("")}

          ${t.langues.map(l => `
            <span class="tag">
              ${escapeHtml(l)}
            </span>
          `).join("")}

        </div>

        ${courses}

      </article>

    `;

  }).join("");

}

function escapeHtml(str){

  return String(str || "")

    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");

}

search.addEventListener("input",render);
sort.addEventListener("change",render);
filterGroup.addEventListener("change",render);

printBtn.addEventListener("click",()=>{
  window.print();
});

loadData();

</script>

</body>
</html>
